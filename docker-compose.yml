services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-on}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - mailpit
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    evolution-api:
        image: 'evoapicloud/evolution-api:latest'
        ports:
            - '${EVOLUTION_PORT:-8080}:8080'
        environment:
            SERVER_URL: '${EVOLUTION_SERVER_URL:-http://localhost:8080}'
            AUTHENTICATION_API_KEY: '${EVOLUTION_API_KEY:-troque-esta-chave}'
            DATABASE_ENABLED: 'true'
            DATABASE_PROVIDER: 'postgresql'
            DATABASE_CONNECTION_URI: 'postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public'
            DATABASE_CONNECTION_CLIENT_NAME: 'evolution'
            DATABASE_SAVE_DATA_INSTANCE: 'true'
            CACHE_REDIS_ENABLED: 'true'
            CACHE_REDIS_URI: 'redis://evolution-redis:6379/6'
            CACHE_REDIS_PREFIX_KEY: 'evolution'
            CACHE_LOCAL_ENABLED: 'false'
            CONFIG_SESSION_PHONE_VERSION: '${EVOLUTION_PHONE_VERSION:-2.3000.1023204200}'
        volumes:
            - 'evolution-instances:/evolution/instances'
        networks:
            - sail
        depends_on:
            - evolution-postgres
            - evolution-redis
    evolution-postgres:
        image: 'postgres:15'
        environment:
            POSTGRES_USER: 'evolution'
            POSTGRES_PASSWORD: 'evolution'
            POSTGRES_DB: 'evolution'
        volumes:
            - 'evolution-postgres:/var/lib/postgresql/data'
        networks:
            - sail
    evolution-redis:
        image: 'redis:7-alpine'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    evolution-instances:
        driver: local
    evolution-postgres:
        driver: local
